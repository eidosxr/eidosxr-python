name: Publish to PyPI

# Publishes eidosxr to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token/secret is stored.
# The package version is taken from eidosxr/version.py (dynamic attr), NOT the
# release tag, so bump that file to match the tag before publishing.
on:
  release:
    types: [published]

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/eidosxr/
    permissions:
      id-token: write # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
